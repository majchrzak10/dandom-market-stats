name: Competitors snapshot

# Osobny workflow od głównego — żeby awaria scrapera (rate limit, captcha,
# zmiana struktury otodom) NIE blokowała głównych statystyk dan-dom.

on:
  schedule:
    - cron: "0 5 * * *"  # 5:00 UTC, zanim odpali główny workflow o 6:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Fetch konkurencja (otodom)
        env:
          COMPETITOR_CITIES: ${{ vars.COMPETITOR_CITIES || 'wagrowiec,rogozno' }}
        run: node scripts/fetch-competitors.mjs

      - name: Sanity check — wykryj nagły spadek scrape'u (>50%)
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'data/competitors/combined';
            if (!fs.existsSync(dir)) { console.log('Brak combined.'); process.exit(0); }
            const files = fs.readdirSync(dir).filter(f => /^\d{4}-\d{2}-\d{2}\.json\$/.test(f)).sort();
            if (files.length < 2) { console.log('Za mało snapshotów do porównania.'); process.exit(0); }
            const curr = JSON.parse(fs.readFileSync(path.join(dir, files.at(-1))));
            const prev = JSON.parse(fs.readFileSync(path.join(dir, files.at(-2))));
            const drop = (prev.offerCount - curr.offerCount) / prev.offerCount;
            console.log(\`Prev: \${prev.offerCount}, Curr: \${curr.offerCount}, drop: \${(drop*100).toFixed(1)}%\`);
            if (curr.offerCount === 0) {
              console.error('::error::Zero ofert konkurencji — scraper prawdopodobnie się zepsuł (zmiana struktury Otodom/OLX?).');
              process.exit(1);
            }
            if (drop > 0.5) {
              console.error(\`::error::Spadek ofert konkurencji >50% (\${(drop*100).toFixed(1)}%) — sprawdź scrapery.\`);
              process.exit(1);
            }
          "

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/competitors/
          if git diff --cached --quiet; then
            echo "Brak nowych danych."
          else
            git commit -m "chore(competitors): otodom+olx $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              if git push origin HEAD; then exit 0; fi
              echo "Push odrzucony (próba $i/3), rebase..."
              git pull --rebase -X ours origin main
            done
            echo "Push nieudany po 3 próbach"
            exit 1
          fi
