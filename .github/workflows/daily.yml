name: Daily snapshot & dashboard

on:
  schedule:
    - cron: "30 6 * * *"  # 6:30 UTC = 8:30 PL latem
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Strona-Dan-Dom (asari-export)
        uses: actions/checkout@v4
        with:
          repository: majchrzak10/Strona-Dan-Dom
          path: strona-dan-dom
          sparse-checkout: |
            asari-export

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Snapshot + analyze + build dashboard
        env:
          ASARI_DATA_DIR: ${{ github.workspace }}/strona-dan-dom/asari-export
        run: npm run all

      - name: Commit snapshot do repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/ data/analytics.json
          if git diff --cached --quiet; then
            echo "Brak nowych snapshotów."
          else
            git commit -m "chore(stats): snapshot $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
